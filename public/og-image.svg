<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FAFAFA"/>

  <!-- Accent bar top -->
  <rect width="1200" height="6" fill="#D2886F"/>

  <!-- Left decorative video grid (subtle) -->
  <g opacity="0.06">
    <rect x="-20" y="100" width="360" height="440" rx="20" stroke="#D2886F" stroke-width="3"/>
    <!-- 2x2 video tile grid -->
    <line x1="160" y1="100" x2="160" y2="540" stroke="#D2886F" stroke-width="2"/>
    <line x1="-20" y1="320" x2="340" y2="320" stroke="#D2886F" stroke-width="2"/>
    <!-- Person silhouettes in tiles -->
    <circle cx="70" cy="200" r="24" stroke="#D2886F" stroke-width="2"/>
    <circle cx="250" cy="200" r="24" stroke="#D2886F" stroke-width="2"/>
    <circle cx="70" cy="420" r="24" stroke="#D2886F" stroke-width="2"/>
    <circle cx="250" cy="420" r="24" stroke="#D2886F" stroke-width="2"/>
  </g>

  <!-- Right decorative video grid -->
  <g opacity="0.06">
    <rect x="860" y="100" width="360" height="440" rx="20" stroke="#D2886F" stroke-width="3"/>
    <line x1="1040" y1="100" x2="1040" y2="540" stroke="#D2886F" stroke-width="2"/>
    <line x1="860" y1="320" x2="1220" y2="320" stroke="#D2886F" stroke-width="2"/>
    <circle cx="950" cy="200" r="24" stroke="#D2886F" stroke-width="2"/>
    <circle cx="1130" cy="200" r="24" stroke="#D2886F" stroke-width="2"/>
    <circle cx="950" cy="420" r="24" stroke="#D2886F" stroke-width="2"/>
    <circle cx="1130" cy="420" r="24" stroke="#D2886F" stroke-width="2"/>
  </g>

  <!-- Center content -->
  <!-- Video camera icon -->
  <g transform="translate(540, 155)">
    <!-- Camera body -->
    <rect x="0" y="12" width="80" height="60" rx="12" stroke="#D2886F" stroke-width="4" fill="none"/>
    <rect x="0" y="12" width="80" height="20" rx="12" fill="#D2886F" opacity="0.15"/>

    <!-- Lens/play triangle -->
    <path d="M90 28 L118 44 L90 60 Z" fill="#D2886F" opacity="0.4"/>

    <!-- Record dot -->
    <circle cx="22" cy="28" r="4" fill="#D2886F" opacity="0.5"/>

    <!-- Grid dots representing multiple meetings -->
    <circle cx="20" cy="50" r="3.5" fill="#D2886F" opacity="0.4"/>
    <circle cx="40" cy="50" r="3.5" fill="#D2886F" opacity="0.4"/>
    <circle cx="60" cy="50" r="3.5" fill="#D2886F" opacity="0.4"/>
    <circle cx="20" cy="65" r="3.5" fill="#D2886F" opacity="0.3"/>
    <circle cx="40" cy="65" r="3.5" fill="#D2886F" opacity="0.3"/>
    <circle cx="60" cy="65" r="3.5" fill="#D2886F" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif" font-size="48" font-weight="600" fill="#171717" letter-spacing="-0.02em">Zoom 회의 일괄 생성기</text>

  <!-- Subtitle -->
  <text x="600" y="390" text-anchor="middle" font-family="'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="300" fill="#525252" letter-spacing="-0.01em">CSV 업로드 → 회의 일괄 생성 → 결과 다운로드</text>

  <!-- Tags -->
  <g transform="translate(600, 440)">
    <!-- CSV -->
    <rect x="-160" y="0" width="70" height="30" rx="15" fill="#D2886F" opacity="0.1"/>
    <text x="-125" y="20" text-anchor="middle" font-family="'Pretendard Variable', Pretendard, sans-serif" font-size="13" font-weight="400" fill="#D2886F">CSV</text>
    <!-- Zoom -->
    <rect x="-76" y="0" width="72" height="30" rx="15" fill="#D2886F" opacity="0.1"/>
    <text x="-40" y="20" text-anchor="middle" font-family="'Pretendard Variable', Pretendard, sans-serif" font-size="13" font-weight="400" fill="#D2886F">Zoom</text>
    <!-- 일괄생성 -->
    <rect x="10" y="0" width="84" height="30" rx="15" fill="#D2886F" opacity="0.1"/>
    <text x="52" y="20" text-anchor="middle" font-family="'Pretendard Variable', Pretendard, sans-serif" font-size="13" font-weight="400" fill="#D2886F">일괄생성</text>
    <!-- PMI -->
    <rect x="108" y="0" width="58" height="30" rx="15" fill="#D2886F" opacity="0.1"/>
    <text x="137" y="20" text-anchor="middle" font-family="'Pretendard Variable', Pretendard, sans-serif" font-size="13" font-weight="400" fill="#D2886F">PMI</text>
  </g>

  <!-- Bottom accent bar -->
  <rect y="624" width="1200" height="6" fill="#D2886F"/>
</svg>
